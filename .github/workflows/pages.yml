name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare static export
        run: |
          # Remove server-only code incompatible with static export
          rm -rf src/app/api || true
          rm -f src/middleware.ts || true
          rm -rf src/app/admin || true
          rm -rf src/app/\(site\)/payment || true

          # Remove both config files and write a clean static one
          rm -f next.config.js next.config.ts next.config.mjs

          node -e "
          const fs = require('fs');
          fs.writeFileSync('next.config.js', [
            '/** @type {import(\"next\").NextConfig} */',
            'const nextConfig = {',
            '  output: \"export\",',
            '  basePath: \"/kishview\",',
            '  trailingSlash: true,',
            '  transpilePackages: [\"maplibre-gl\"],',
            '  images: { unoptimized: true },',
            '  env: { NEXT_PUBLIC_BASE_PATH: \"/kishview\" },',
            '};',
            'module.exports = nextConfig;',
          ].join('\n'));
          console.log('next.config.js written');
          console.log(fs.readFileSync('next.config.js', 'utf8'));
          "

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
